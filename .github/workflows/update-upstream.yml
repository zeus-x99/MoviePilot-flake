name: Update Upstream

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      components:
        description: "空格分隔的组件列表；留空时更新全部"
        required: false
        default: "backend frontend plugins resources"
        type: string
      check_mode:
        description: "同步后的校验模式"
        required: true
        default: quick
        type: choice
        options:
          - quick
          - full
          - skip

concurrency:
  group: update-upstream
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-upstream:
    name: Update Upstream Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Capture versions before update
        id: before
        run: |
          set -euo pipefail

          short_rev() {
            printf '%s' "${1:0:8}"
          }

          backend_version="$(nix eval --raw .#lib.packageVersions.backend)"
          frontend_rev="$(nix eval --raw .#lib.sourceRevisions.frontend)"
          plugins_rev="$(nix eval --raw .#lib.sourceRevisions.plugins)"
          resources_rev="$(nix eval --raw .#lib.sourceRevisions.resources)"

          {
            echo "backend_version=${backend_version}"
            echo "frontend_rev=$(short_rev "${frontend_rev}")"
            echo "plugins_rev=$(short_rev "${plugins_rev}")"
            echo "resources_rev=$(short_rev "${resources_rev}")"
          } >>"${GITHUB_OUTPUT}"

      - name: Run update-upstream
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMPONENTS: ${{ github.event.inputs.components }}
          CHECK_MODE_INPUT: ${{ github.event.inputs.check_mode }}
        run: |
          set -euo pipefail

          args=()
          check_mode="quick"

          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            check_mode="skip"
          elif [[ -n "${CHECK_MODE_INPUT:-}" ]]; then
            check_mode="${CHECK_MODE_INPUT}"
          fi

          if [[ -n "${COMPONENTS}" ]]; then
            read -r -a component_args <<<"${COMPONENTS}"
            args+=("${component_args[@]}")
          fi

          case "${check_mode}" in
            quick)
              ;;
            full)
              args+=(--full-check)
              ;;
            skip)
              args+=(--skip-check)
              ;;
            *)
              echo "未知校验模式: ${check_mode}" >&2
              exit 1
              ;;
          esac

          nix run .#update-upstream -- "${args[@]}"

      - name: Capture versions after update
        id: after
        run: |
          set -euo pipefail

          short_rev() {
            printf '%s' "${1:0:8}"
          }

          backend_version="$(nix eval --raw .#lib.packageVersions.backend)"
          frontend_rev="$(nix eval --raw .#lib.sourceRevisions.frontend)"
          plugins_rev="$(nix eval --raw .#lib.sourceRevisions.plugins)"
          resources_rev="$(nix eval --raw .#lib.sourceRevisions.resources)"

          {
            echo "backend_version=${backend_version}"
            echo "frontend_rev=$(short_rev "${frontend_rev}")"
            echo "plugins_rev=$(short_rev "${plugins_rev}")"
            echo "resources_rev=$(short_rev "${resources_rev}")"
          } >>"${GITHUB_OUTPUT}"

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ secrets.MOVIEPILOTNIX_ACTIONS_PAT || github.token }}
          PR_TITLE: "chore: MoviePilot ${{ steps.before.outputs.backend_version }} -> ${{ steps.after.outputs.backend_version }}"
          PR_BODY_FRONTEND_BEFORE: ${{ steps.before.outputs.frontend_rev }}
          PR_BODY_FRONTEND_AFTER: ${{ steps.after.outputs.frontend_rev }}
          PR_BODY_PLUGINS_BEFORE: ${{ steps.before.outputs.plugins_rev }}
          PR_BODY_PLUGINS_AFTER: ${{ steps.after.outputs.plugins_rev }}
          PR_BODY_RESOURCES_BEFORE: ${{ steps.before.outputs.resources_rev }}
          PR_BODY_RESOURCES_AFTER: ${{ steps.after.outputs.resources_rev }}
        run: |
          set -euo pipefail

          branch="automation/update-upstream"
          body_file="${RUNNER_TEMP}/update-upstream-pr-body.md"

          if git diff --quiet --exit-code -- flake.lock nix/sources.nix; then
            echo "No upstream changes; skipping PR update."
            exit 0
          fi

          cat >"${body_file}" <<EOF
          - frontend: ${PR_BODY_FRONTEND_BEFORE} -> ${PR_BODY_FRONTEND_AFTER}
          - plugins: ${PR_BODY_PLUGINS_BEFORE} -> ${PR_BODY_PLUGINS_AFTER}
          - resources: ${PR_BODY_RESOURCES_BEFORE} -> ${PR_BODY_RESOURCES_AFTER}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "${branch}"
          git add flake.lock nix/sources.nix

          if git diff --cached --quiet; then
            echo "No staged upstream changes; skipping PR update."
            exit 0
          fi

          git commit -m "chore: update MoviePilot upstream inputs"
          git push -f origin "${branch}"

          pr_number="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --head "${branch}" \
              --json number \
              --jq '.[0].number // ""'
          )"

          if [[ -n "${pr_number}" ]]; then
            gh pr edit "${pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${PR_TITLE}" \
              --body-file "${body_file}"
          else
            closed_pr_number="$(
              gh pr list \
                --repo "${GITHUB_REPOSITORY}" \
                --state closed \
                --head "${branch}" \
                --json number \
                --jq '.[0].number // ""'
            )"

            if [[ -n "${closed_pr_number}" ]]; then
              gh pr reopen "${closed_pr_number}" --repo "${GITHUB_REPOSITORY}"
              gh pr edit "${closed_pr_number}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${PR_TITLE}" \
                --body-file "${body_file}"
            else
              gh pr create \
                --repo "${GITHUB_REPOSITORY}" \
                --base main \
                --head "${branch}" \
                --title "${PR_TITLE}" \
                --body-file "${body_file}"
            fi
          fi
