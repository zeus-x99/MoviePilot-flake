name: Auto Merge Upstream PR

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: auto-merge-upstream
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve upstream pull request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.MOVIEPILOTNIX_ACTIONS_PAT || github.token }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          pr_number="$(
            python -c 'import json, os; event=json.load(open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8")); prs=event.get("workflow_run", {}).get("pull_requests", []); print(prs[0]["number"] if prs else "")'
          )"

          if [[ -z "${pr_number}" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=no-linked-pr" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          state="$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json state --jq .state)"
          is_draft="$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft)"
          head_ref="$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json headRefName --jq .headRefName)"
          base_ref="$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json baseRefName --jq .baseRefName)"
          head_sha="$(gh pr view "${pr_number}" --repo "${GITHUB_REPOSITORY}" --json headRefOid --jq .headRefOid)"

          if [[ "${state}" != "OPEN" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=pr-not-open" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${is_draft}" != "false" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=pr-draft" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${head_ref}" != "automation/update-upstream" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=not-upstream-pr" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${base_ref}" != "main" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=unexpected-base" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${head_sha}" != "${TESTED_SHA}" ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "reason=head-changed-after-ci" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "skip=false" >>"${GITHUB_OUTPUT}"
          echo "number=${pr_number}" >>"${GITHUB_OUTPUT}"

      - name: Auto merge upstream pull request
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.MOVIEPILOTNIX_ACTIONS_PAT || github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          gh pr merge "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --delete-branch \
            --match-head-commit "${TESTED_SHA}"
