name: Update Upstream

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      components:
        description: "空格分隔的组件列表；留空时更新全部"
        required: false
        default: "backend frontend plugins resources"
        type: string
      check_mode:
        description: "同步后的校验模式"
        required: true
        default: quick
        type: choice
        options:
          - quick
          - full
          - skip

concurrency:
  group: update-upstream
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update-upstream:
    name: Update Upstream Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Capture versions before update
        id: before
        run: |
          set -euo pipefail

          short_rev() {
            printf '%s' "${1:0:8}"
          }

          backend_version="$(nix eval --raw .#lib.packageVersions.backend)"
          frontend_rev="$(nix eval --raw .#lib.sourceRevisions.frontend)"
          plugins_rev="$(nix eval --raw .#lib.sourceRevisions.plugins)"
          resources_rev="$(nix eval --raw .#lib.sourceRevisions.resources)"

          {
            echo "backend_version=${backend_version}"
            echo "frontend_rev=$(short_rev "${frontend_rev}")"
            echo "plugins_rev=$(short_rev "${plugins_rev}")"
            echo "resources_rev=$(short_rev "${resources_rev}")"
          } >>"${GITHUB_OUTPUT}"

      - name: Run update-upstream
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMPONENTS: ${{ github.event.inputs.components }}
          CHECK_MODE_INPUT: ${{ github.event.inputs.check_mode }}
        run: |
          set -euo pipefail

          args=()
          check_mode="quick"

          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            check_mode="skip"
          elif [[ -n "${CHECK_MODE_INPUT:-}" ]]; then
            check_mode="${CHECK_MODE_INPUT}"
          fi

          if [[ -n "${COMPONENTS}" ]]; then
            read -r -a component_args <<<"${COMPONENTS}"
            args+=("${component_args[@]}")
          fi

          case "${check_mode}" in
            quick)
              ;;
            full)
              args+=(--full-check)
              ;;
            skip)
              args+=(--skip-check)
              ;;
            *)
              echo "未知校验模式: ${check_mode}" >&2
              exit 1
              ;;
          esac

          nix run .#update-upstream -- "${args[@]}"

      - name: Capture versions after update
        id: after
        run: |
          set -euo pipefail

          short_rev() {
            printf '%s' "${1:0:8}"
          }

          backend_version="$(nix eval --raw .#lib.packageVersions.backend)"
          frontend_rev="$(nix eval --raw .#lib.sourceRevisions.frontend)"
          plugins_rev="$(nix eval --raw .#lib.sourceRevisions.plugins)"
          resources_rev="$(nix eval --raw .#lib.sourceRevisions.resources)"

          {
            echo "backend_version=${backend_version}"
            echo "frontend_rev=$(short_rev "${frontend_rev}")"
            echo "plugins_rev=$(short_rev "${plugins_rev}")"
            echo "resources_rev=$(short_rev "${resources_rev}")"
          } >>"${GITHUB_OUTPUT}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            flake.lock
            nix/sources.nix
          branch: automation/update-upstream
          commit-message: "chore: update MoviePilot upstream inputs"
          title: "chore: MoviePilot ${{ steps.before.outputs.backend_version }} -> ${{ steps.after.outputs.backend_version }}"
          token: ${{ secrets.MOVIEPILOTNIX_ACTIONS_PAT || github.token }}
          body: |
            - frontend: ${{ steps.before.outputs.frontend_rev }} -> ${{ steps.after.outputs.frontend_rev }}
            - plugins: ${{ steps.before.outputs.plugins_rev }} -> ${{ steps.after.outputs.plugins_rev }}
            - resources: ${{ steps.before.outputs.resources_rev }} -> ${{ steps.after.outputs.resources_rev }}
          delete-branch: true
